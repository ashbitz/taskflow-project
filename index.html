<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow Project</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header>
      <h1>
        <img src="icon.png" alt="logo" class="logo-icon" />
        Task<span class="flow">Flow</span>
      </h1>
    </header>

    <main>
      <aside>
        <h3>Menú</h3>
        <nav>
          <ul>
            <li><a href="#">🟢Tareas Abiertas</a></li>
            <li><a href="#">⚫Tareas Cerradas</a></li>
            <li><a href="#">📈Estadísticas</a></li>
            <li><a href="#">✉️Contacto</a></li>
          </ul>
        </nav>
      </aside>

      <section>
        <form id="task-form" class="task-form">
          <input type="text" id="task-input" placeholder="Tarea" required />

          <input
            type="text"
            id="category-input"
            placeholder="Categoría"
            required
          />

          <select id="priority-input">
            <option value="alta">Alta</option>
            <option value="media">Media</option>
            <option value="baja">Baja</option>
          </select>

          <button type="submit">Añadir</button>
        </form>

        <div id="task-list">
          <article>
            <span class="titulo">Proyecto HTML</span>
            <span class="categoria">Trabajo</span>
            <span class="badge alta">Alta</span>
          </article>
          <article>
            <span class="titulo">Proyecto CSS</span>
            <span class="categoria">Trabajo</span>
            <span class="badge alta">Alta</span>
          </article>

          <article>
            <span class="titulo">Examen</span>
            <span class="categoria">Estudios</span>
            <span class="badge media">Media</span>
          </article>
          <article>
            <span class="titulo">Ocio</span>
            <span class="categoria">Personal</span>
            <span class="badge baja">Baja</span>
          </article>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
