<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow Project</title>
    <link rel="stylesheet" href="output.css" />
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body
    class="min-h-screen font-sans bg-gradient-to-br from-indigo-100 via-sky-100 to-purple-100 dark:from-slate-900 dark:via-indigo-950 dark:to-slate-900"
  >
    <header
      class="dark:bg-slate-800/80 dark:border-slate-700 dark:text-slate-100 max-w-[1500px] mx-auto mt-5 px-12 py-5 bg-white border border-gray-200 rounded-xl shadow-lg"
    >
      <div class="flex items-center justify-between w-full">
        <h1 class="flex items-center text-3xl font-bold">
          <img src="icon.png" alt="logo" class="w-9 h-9 mr-2" />
          Task<span class="text-[#8d65c5]">Flow</span>
        </h1>

        <button
          id="theme-toggle"
          class="flex h-10 w-10 items-center justify-center rounded-full border border-gray-200 bg-white text-xl transition hover:bg-gray-100 dark:bg-slate-800 dark:border-slate-600 dark:text-slate-100 dark:hover:bg-slate-700"
        >
          🌑
        </button>
      </div>
    </header>

    <main class="max-w-[1500px] mx-auto flex gap-3 mt-5">
      <aside
        class="dark:bg-slate-800/80 dark:border-slate-700 dark:text-slate-100 w-64 bg-white border border-gray-200 rounded-xl shadow-lg p-5"
      >
        <!-- <h3>Menú</h3> -->
        <nav>
          <ul class="mb-2 flex flex-col gap-2 text-slate-900">
            <li>
              <a class="text-slate-900 dark:text-slate-100" href="#">
                ☑️ Tareas Abiertas
              </a>
            </li>
            <li>
              <a class="text-slate-900 dark:text-slate-100" href="#">
                ✖️ Tareas Cerradas
              </a>
            </li>
            <li>
              <a class="text-slate-900 dark:text-slate-100" href="#">
                🟣 Estadísticas
              </a>
            </li>
            <li>
              <a class="text-slate-900 dark:text-slate-100" href="#">
                ✉️ Contacto
              </a>
            </li>
          </ul>
        </nav>
      </aside>

      <section
        class="dark:bg-slate-800/80 dark:border-slate-700 dark:text-slate-100 flex-1 bg-white border border-gray-200 rounded-xl shadow-lg p-5 flex flex-col gap-3"
      >
        <form
          id="task-form"
          class="dark:bg-slate-900/60 dark:border-slate-700 bg-white border border-gray-200 rounded-xl shadow-lg p-4 flex flex-wrap gap-3"
        >
          <input
            class="flex-1 min-w-[220px] rounded-lg border border-gray-300 px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-400 dark:bg-slate-800 dark:text-slate-100"
            type="text"
            id="task-input"
            placeholder="Tarea"
            required
          />

          <input
            class="flex-1 min-w-[180px] rounded-lg border border-gray-300 px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-400 dark:bg-slate-800 dark:text-slate-100"
            type="text"
            id="category-input"
            placeholder="Categoría"
            required
          />

          <select
            id="priority-input"
            class="w-36 rounded-lg border border-gray-300 px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-400 dark:bg-slate-800 dark:text-slate-100 dark:border-slate-600"
          >
            <option value="alta">Alta</option>
            <option value="media">Media</option>
            <option value="baja">Baja</option>
          </select>

          <button
            type="submit"
            class="rounded-lg bg-[#8d65c5] px-4 py-2 font-semibold text-white hover:bg-indigo-600 transition"
          >
            Añadir
          </button>
        </form>

        <div id="task-list"></div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
